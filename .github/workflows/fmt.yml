name: fmt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: fmt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting (advisory)
        # CI surfaces a warning instead of failing so an unformatted tree doesn't
        # block the build. To enforce later: `cargo fmt --all` locally before push.
        run: |
          if ! cargo fmt --all -- --check; then
            echo "::warning::cargo fmt found formatting drift; run 'cargo fmt --all' locally"
          fi
