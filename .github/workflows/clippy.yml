name: clippy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: clippy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Pin ed25519-dalek to compatible version
        # soroban-env-host 21.x requires ed25519-dalek 2.x / rand_core 0.6.x.
        # Without this pin, cargo resolves ed25519-dalek 3.x (rand_core 0.9+)
        # which breaks the ChaCha20Rng: CryptoRng bound in soroban-env-host.
        run: cargo update ed25519-dalek@3.0.0 --precise 2.2.0
      - name: Run clippy
        # Only deny `clippy::correctness`. That category gates
        # soundness bugs that change contract state or control flow,
        # or leak funds, when the source compiles at all --
        # concrete members that surface here include
        # `iterator_step_by_zero` (zero-step iter panics) and
        # `iter_next_loop` (`while let Some(_) = iter.next()`
        # loss-of-size_hint / hang pattern). Note that unchecked
        # arithmetic overflow is NOT in this category; the safety
        # net for that is the "use `checked_*` everywhere totals
        # could overflow" rule in `docs/SECURE_CODING_GUIDELINES.md`,
        # enforced by code review, not by clippy. The wider
        # `suspicious` and `complexity` categories are surfaced as
        # warnings; their members are mostly mechanical rewrites
        # (`unnecessary_cast`, `manual_saturating_sub`,
        # `redundant_clone`, `needless_borrow`, etc.) and the
        # workspace cascade cost of denying them is high. Critical
        # security review remains the responsibility of code review
        # -- see the failure modes clippy cannot see enumerated in
        # `docs/SECURITY_MODEL.md` "Static analysis gaps".
        #
        # `too_many_arguments` is allowed workspace-wide: Soroban contract
        # entry points take args directly from the transaction ABI and
        # grouping them into structs would break the public interface.
        #
        # To widen the deny ladder, see `docs/CI_FAILURES_RUNBOOK.md`
        # step "Widen or narrow the clippy deny ladder".
        run: cargo clippy --workspace --all-targets --message-format=short -- -D clippy::correctness -A clippy::too_many_arguments
