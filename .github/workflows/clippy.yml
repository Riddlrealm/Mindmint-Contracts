name: clippy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: clippy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        # Only deny high-confidence correctness/suspicious categories so the
        # workspace's ~110 Soroban crates pass. Style and pedantic lints are
        # left as advisory output for reviewers to triage.
        #
        # `too_many_arguments` is allowed workspace-wide: Soroban contract
        # entry points take args directly from the transaction ABI and
        # grouping them into structs would break the public interface.
        run: cargo clippy --workspace --all-targets --message-format=short -- -D clippy::correctness -D clippy::suspicious -D clippy::complexity -A clippy::too_many_arguments
