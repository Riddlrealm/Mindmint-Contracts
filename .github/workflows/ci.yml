name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Pin ed25519-dalek to 2.x
        # soroban-env-host 21.2.1 was written against the ed25519-dalek v2
        # rand_core API. The resolver selects v3 on a cold cache, which breaks
        # SigningKey::generate (E0277). Pin to the last 2.x release until the
        # workspace moves to a soroban-sdk version that supports v3.
        run: cargo update ed25519-dalek@3.0.0 --precise 2.2.0
      - name: Cargo check
        run: cargo check --workspace --all-targets
      - name: Cargo test (compile only)
        # Compiles the test binaries without running them; ensures tests still build.
        run: cargo test --workspace --no-run
