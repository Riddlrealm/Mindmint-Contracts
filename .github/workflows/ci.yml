name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Pin ed25519-dalek to compatible version
        # soroban-env-host 21.x requires ed25519-dalek 2.x / rand_core 0.6.x.
        # Without this pin, cargo resolves ed25519-dalek 3.x (rand_core 0.9+)
        # which breaks the ChaCha20Rng: CryptoRng bound in soroban-env-host.
        run: cargo update ed25519-dalek@3.0.0 --precise 2.2.0
      - name: Cargo check
        run: cargo check --workspace --all-targets
      - name: Cargo test (compile only)
        # Compiles the test binaries without running them; ensures tests still build.
        run: cargo test --workspace --no-run
