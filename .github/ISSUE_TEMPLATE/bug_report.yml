name: Bug Report
description: Report a defect or unexpected behaviour.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Rust version:
        Soroban CLI version:
  - type: textarea
    id: additional
    attributes:
      label: Additional context
